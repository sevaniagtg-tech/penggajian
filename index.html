<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Penggajian</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#2196F3;
        }

        button{
            width:100%;
            padding:12px;
            background:#2196F3;
            color:#fff;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1976D2;
        }

        #error{
            color:red;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Aplikasi Penggajian</h2>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan Username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan Password">
    </div>

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script src="login.js"></script>

</body>
</html>
