<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penggajian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#1976D2;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.simpan{
    background:#1976D2;
}

.kembali{
    background:#4CAF50;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #ccc;
}

th{
    background:#1976D2;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>Data Penggajian</h2>

<input type="text" id="nik" placeholder="NIK">
<input type="text" id="nama" placeholder="Nama Karyawan">
<input type="text" id="jabatan" placeholder="Jabatan">

<input type="number" id="gajiPokok" placeholder="Gaji Pokok">
<input type="number" id="tunjangan" placeholder="Tunjangan">
<input type="number" id="potongan" placeholder="Potongan">

<br><br>

<button class="simpan" onclick="hitungGaji()">Simpan</button>

<button class="kembali" onclick="window.location.href='dashboard.html'">
Kembali
</button>

<table>

<thead>
<tr>
<th>No</th>
<th>NIK</th>
<th>Nama</th>
<th>Jabatan</th>
<th>Gaji Pokok</th>
<th>Tunjangan</th>
<th>Potongan</th>
<th>Total Gaji</th>
</tr>
</thead>

<tbody id="tabelPenggajian">

</tbody>

</table>

</div>

<script src="penggajian.js"></script>

</body>
</html>
