<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Penggajian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#1976D2;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.menu{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:220px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#1976D2;
    margin-bottom:15px;
}

.card p{
    margin-bottom:20px;
    color:#555;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#1976D2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#125ea7;
}

.logout{
    width:200px;
    margin:40px auto;
    display:block;
    background:#d32f2f;
}

.logout:hover{
    background:#b71c1c;
}
</style>

</head>
<body>

<header>
    <h1>SISTEM PENGGAJIAN KARYAWAN</h1>
</header>

<div class="container">

    <div class="menu">

        <div class="card">
            <h2>Karyawan</h2>
            <p>Kelola data karyawan.</p>
            <button onclick="bukaKaryawan()">Masuk</button>
        </div>

        <div class="card">
            <h2>Penggajian</h2>
            <p>Input dan hitung gaji.</p>
            <button onclick="bukaPenggajian()">Masuk</button>
        </div>

        <div class="card">
            <h2>Laporan</h2>
            <p>Lihat laporan penggajian.</p>
            <button onclick="bukaLaporan()">Masuk</button>
        </div>

    </div>

    <button class="logout" onclick="logout()">
        Logout
    </button>

</div>

<script src="dashboard.js"></script>

</body>
</html>
