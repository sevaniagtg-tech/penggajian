<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laporan Penggajian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:90%;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#1976D2;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #ccc;
}

th{
    background:#1976D2;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
    background:#4CAF50;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>Laporan Penggajian</h2>

<table>
<thead>
<tr>
<th>No</th>
<th>NIK</th>
<th>Nama</th>
<th>Jabatan</th>
<th>Gaji Pokok</th>
<th>Tunjangan</th>
<th>Potongan</th>
<th>Total Gaji</th>
</tr>
</thead>

<tbody id="dataLaporan">

</tbody>

</table>

<button onclick="window.location.href='dashboard.html'">
Kembali
</button>

</div>

<script src="laporan.js"></script>

</body>
</html>
